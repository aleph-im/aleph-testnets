name: PR Integration Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-tests-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: digitalocean

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}" | base64 --decode > ~/.ssh/id_ed25519
          chmod 0700 ~/.ssh
          chmod 0600 ~/.ssh/id_ed25519

      - name: Create CCN and CRN Droplets
        run: |
          CCN_NAME="testnets-pr-${{ github.event.number }}-${{ github.run_id }}"
          CRN_NAME="testnets-crn-0-pr${{ github.event.number }}-${{ github.run_id }}"
          echo "DROPLET_NAME=$CCN_NAME" >> "$GITHUB_ENV"
          echo "CRN_NAME=$CRN_NAME" >> "$GITHUB_ENV"

          # Create both droplets in parallel
          doctl compute droplet create \
            --image ubuntu-24-04-x64 \
            --size s-4vcpu-8gb \
            --region ams3 \
            --ssh-keys ${{ vars.DO_SSH_KEY_FINGERPRINT }} \
            --tag-name testnets-ci \
            --wait \
            "$CCN_NAME" &
          CCN_PID=$!

          doctl compute droplet create \
            --image debian-12-x64 \
            --size s-4vcpu-8gb \
            --region ams3 \
            --ssh-keys ${{ vars.DO_SSH_KEY_FINGERPRINT }} \
            --tag-name testnets-crn \
            --enable-ipv6 \
            --wait \
            "$CRN_NAME" &
          CRN_PID=$!

          wait $CCN_PID $CRN_PID

      - name: Get Droplet IPs
        timeout-minutes: 2
        run: |
          until DROPLET_IPV4=$(doctl compute droplet get "$DROPLET_NAME" --format PublicIPv4 --no-header 2>/dev/null) && [ -n "$DROPLET_IPV4" ]; do
            sleep 2
          done
          echo "DROPLET_IPV4=$DROPLET_IPV4" >> "$GITHUB_ENV"
          echo "CCN Droplet IP: $DROPLET_IPV4"

          until CRN_IPV4=$(doctl compute droplet get "$CRN_NAME" --format PublicIPv4 --no-header 2>/dev/null) && [ -n "$CRN_IPV4" ]; do
            sleep 2
          done
          echo "CRN_IPV4=$CRN_IPV4" >> "$GITHUB_ENV"
          echo "CRN Droplet IP: $CRN_IPV4"

          CRN_IPV6=$(doctl compute droplet get "$CRN_NAME" --format PublicIPv6 --no-header 2>/dev/null || true)
          echo "CRN_IPV6=$CRN_IPV6" >> "$GITHUB_ENV"
          echo "CRN Droplet IPv6: $CRN_IPV6"

      - name: Wait for SSH
        timeout-minutes: 3
        run: |
          until ssh-keyscan -H "$DROPLET_IPV4" >> ~/.ssh/known_hosts 2>/dev/null; do
            sleep 3
          done
          until ssh-keyscan -H "$CRN_IPV4" >> ~/.ssh/known_hosts 2>/dev/null; do
            sleep 3
          done

      - name: Install system dependencies (CCN + CRN in parallel)
        run: |
          # CCN: wait for cloud-init, install docker + foundry + pip
          (
            ssh root@${DROPLET_IPV4} "cloud-init status --wait || true"
            ssh root@${DROPLET_IPV4} "while fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 2; done"
            ssh root@${DROPLET_IPV4} "DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 update"
            ssh root@${DROPLET_IPV4} "DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 install -y docker.io docker-compose-v2 python3-pip jq curl"
          ) &
          CCN_PID=$!

          # CRN: wait for cloud-init, install docker + apparmor + aleph-vm .deb
          # (crn-up.sh --install will be called later from the CCN droplet, but we
          #  can get the heavy apt work done now while the CCN is also installing)
          (
            ssh root@${CRN_IPV4} "cloud-init status --wait || true"
            ssh root@${CRN_IPV4} "while fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 2; done"
            ssh root@${CRN_IPV4} "DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 update"
            ssh root@${CRN_IPV4} "DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 upgrade -y"
            ssh root@${CRN_IPV4} "DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 install -y docker.io apparmor-profiles"
          ) &
          CRN_PID=$!

          wait $CCN_PID $CRN_PID

      - name: Install Foundry
        # Needed on the host for test fixtures (cast_send/cast_call in conftest.py).
        # Contract deployment uses the Docker container, but tests invoke cast directly.
        run: |
          ssh root@${DROPLET_IPV4} "curl -L https://foundry.paradigm.xyz | bash"
          ssh root@${DROPLET_IPV4} "/root/.foundry/bin/foundryup"
          # Symlink to /usr/local/bin so cast/forge are on PATH for non-interactive SSH
          ssh root@${DROPLET_IPV4} "ln -sf /root/.foundry/bin/cast /usr/local/bin/cast"
          ssh root@${DROPLET_IPV4} "ln -sf /root/.foundry/bin/forge /usr/local/bin/forge"

      - name: Rsync repo to Droplet
        run: |
          rsync -az \
            --exclude .git \
            --exclude contracts/out \
            --exclude contracts/cache \
            --exclude contracts/broadcast \
            --exclude .worktrees \
            --exclude bin \
            --exclude .local \
            --exclude __pycache__ \
            -e ssh \
            ./ root@${DROPLET_IPV4}:/opt/aleph-testnets/

      - name: Setup environment
        run: |
          ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && bash scripts/local-up.sh --env"

      - name: Prepare CRN state on CCN
        run: |
          ssh root@${DROPLET_IPV4} "mkdir -p /opt/aleph-testnets/.local/crn/0"
          ssh root@${DROPLET_IPV4} "echo '$CRN_NAME' > /opt/aleph-testnets/.local/crn/0/droplet-name"
          ssh root@${DROPLET_IPV4} "echo '$CRN_IPV4' > /opt/aleph-testnets/.local/crn/0/droplet-ip"
          if [ -n "${CRN_IPV6:-}" ]; then
            ssh root@${DROPLET_IPV4} "echo '$CRN_IPV6' > /opt/aleph-testnets/.local/crn/0/droplet-ipv6"
          fi

          scp ~/.ssh/id_ed25519 root@${DROPLET_IPV4}:/root/.ssh/id_ed25519
          ssh root@${DROPLET_IPV4} "chmod 600 /root/.ssh/id_ed25519"

      - name: Start stack + deploy contracts (CCN) and install CRN (parallel)
        run: |
          log_dir=$(mktemp -d)
          echo "LOG_DIR=$log_dir" >> "$GITHUB_ENV"

          # CCN path: bring up the stack, then deploy contracts + start indexer.
          # CRN --register depends on both, so it still runs serially after this.
          (
            set -e
            ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && bash scripts/local-up.sh --up"
            ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && bash scripts/local-up.sh --deploy-contracts"
          ) >"$log_dir/ccn.log" 2>&1 &
          CCN_PID=$!

          # CRN --install (download .deb, docker pull vm-connector, supervisor config).
          # Independent of the CCN stack — safe to run concurrently.
          (
            set -e
            ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && \
              CCN_URL=http://${DROPLET_IPV4}:4024 \
              SSH_KEY_FILE=/root/.ssh/id_ed25519 \
              bash scripts/crn-up.sh --install"
          ) >"$log_dir/crn-install.log" 2>&1 &
          CRN_PID=$!

          # Wait on both; tag which side failed so the log is easy to read.
          ccn_rc=0; crn_rc=0
          wait $CCN_PID || ccn_rc=$?
          wait $CRN_PID || crn_rc=$?

          echo "===== CCN log (rc=$ccn_rc) ====="
          cat "$log_dir/ccn.log"
          echo "===== CRN install log (rc=$crn_rc) ====="
          cat "$log_dir/crn-install.log"

          if [ $ccn_rc -ne 0 ] || [ $crn_rc -ne 0 ]; then
            exit 1
          fi

      - name: Register CRN
        run: |
          ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && \
            CCN_URL=http://${DROPLET_IPV4}:4024 \
            SSH_KEY_FILE=/root/.ssh/id_ed25519 \
            bash scripts/crn-up.sh --register"

      - name: Run tests
        run: |
          ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && bash scripts/local-up.sh --test"

      - name: Collect test results
        if: always()
        run: |
          scp root@${DROPLET_IPV4}:/opt/aleph-testnets/results.xml ./results.xml 2>/dev/null || true

      - name: Collect container logs
        if: always()
        run: |
          ssh root@${DROPLET_IPV4} "cd /opt/aleph-testnets && bash scripts/local-up.sh --logs" > docker-logs.txt 2>&1 || true

      - name: Collect CRN logs
        if: always()
        run: |
          if [ -n "${CRN_IPV4:-}" ]; then
            ssh root@${CRN_IPV4} "journalctl -u aleph-vm-supervisor.service --no-pager -n 500" > crn-supervisor.txt 2>&1 || true
            ssh root@${CRN_IPV4} "docker logs vm-connector" > crn-vm-connector.txt 2>&1 || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results.xml
            docker-logs.txt
            crn-supervisor.txt
            crn-vm-connector.txt

      - name: Destroy CRN Droplet
        if: always()
        run: |
          if [ -n "${CRN_NAME:-}" ]; then
            doctl compute droplet delete --force "$CRN_NAME" || true
          fi

      - name: Destroy Droplet
        if: always()
        run: |
          doctl compute droplet delete --force "$DROPLET_NAME" || true
