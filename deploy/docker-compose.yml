volumes:
  pyaleph-postgres:
  pyaleph-rabbitmq:
  pyaleph-redis:
  pyaleph-ipfs:

services:
  pyaleph:
    restart: always
    image: ${PYALEPH_IMAGE}:${PYALEPH_TAG}
    command: --config /opt/pyaleph/config.yml --key-dir /opt/pyaleph/keys -v
    volumes:
      - ./config.yml:/opt/pyaleph/config.yml:ro
      - /etc/pyaleph/keys:/opt/pyaleph/keys
      - /var/lib/pyaleph:/var/lib/pyaleph
    depends_on:
      - postgres
      - ipfs
      - p2p-service
      - redis
      - anvil
    networks:
      - pyaleph
    logging:
      options:
        max-size: 50m

  pyaleph-api:
    restart: always
    image: ${PYALEPH_IMAGE}:${PYALEPH_TAG}
    command: --config /opt/pyaleph/config.yml --key-dir /opt/pyaleph/keys -v
    entrypoint: ["bash", "deployment/scripts/run_aleph_ccn_api.sh"]
    ports:
      - "4024:4024/tcp"
    volumes:
      - ./config.yml:/opt/pyaleph/config.yml:ro
      - /var/lib/pyaleph:/var/lib/pyaleph
    environment:
      CCN_CONFIG_API_PORT: 4024
      CCN_CONFIG_API_NB_WORKERS: 4
    depends_on:
      - pyaleph
    networks:
      - pyaleph
    logging:
      options:
        max-size: 50m

  p2p-service:
    restart: always
    image: ${P2P_SERVICE_IMAGE}:${P2P_SERVICE_TAG}
    networks:
      - pyaleph
    volumes:
      - ./config.yml:/etc/p2p-service/config.yml:ro
      - /etc/pyaleph/keys/node-secret.pkcs8.der:/etc/p2p-service/node-secret.pkcs8.der:ro
    depends_on:
      - rabbitmq
    environment:
      RUST_LOG: info
    ports:
      - "4025:4025"
      - "127.0.0.1:4030:4030"
    command:
      - "--config"
      - "/etc/p2p-service/config.yml"
      - "--private-key-file"
      - "/etc/p2p-service/node-secret.pkcs8.der"

  postgres:
    restart: always
    image: ${POSTGRES_IMAGE}:${POSTGRES_TAG}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pyaleph-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aleph
      POSTGRES_PASSWORD: decentralize-everything
      POSTGRES_DB: aleph
    networks:
      - pyaleph
    shm_size: "2gb"

  rabbitmq:
    restart: always
    image: ${RABBITMQ_IMAGE}:${RABBITMQ_TAG}
    networks:
      - pyaleph
    environment:
      RABBITMQ_DEFAULT_USER: aleph-p2p
      RABBITMQ_DEFAULT_PASS: change-me!
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - pyaleph-rabbitmq:/var/lib/rabbitmq

  redis:
    restart: always
    image: ${REDIS_IMAGE}:${REDIS_TAG}
    networks:
      - pyaleph
    volumes:
      - pyaleph-redis:/data

  ipfs:
    restart: always
    image: ${IPFS_IMAGE}:${IPFS_TAG}
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    volumes:
      - pyaleph-ipfs:/data/ipfs
      - ./001-update-ipfs-config.sh:/container-init.d/001-update-ipfs-config.sh:ro
    environment:
      - IPFS_PROFILE=server
      - IPFS_TELEMETRY=off
    networks:
      - pyaleph
    command: ["daemon", "--enable-pubsub-experiment", "--enable-gc", "--migrate"]

  anvil:
    restart: always
    image: ${ANVIL_IMAGE}:${ANVIL_TAG}
    networks:
      - pyaleph
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--code-size-limit", "100000"]

  indexer:
    restart: always
    image: ${INDEXER_IMAGE}:${INDEXER_TAG}
    environment:
      INDEXER: aleph-credit
      INDEXER_BLOCKCHAINS: ethereum
      INDEXER_MIN_BLOCK_HEIGHT: "0"
      INDEXER_API_PORT: "8081"
      INDEXER_NAMESPACE: aleph-credit
      INDEXER_CHAINS_CONFIG: /config/chains.yaml
      ETHEREUM_RPC: http://anvil:8545
      ETHEREUM_EXPLORER_URL: "http://localhost:0"
      ALEPH_HOST: http://pyaleph-api:4024
      ALEPH_PAYMENT_CHANNEL: ALEPH_TESTNET_CREDIT
      ALEPH_PAYMENT_ADDRESS: ${CREDIT_SENDER_ADDRESS}
    volumes:
      - ./indexer/chains.yaml:/config/chains.yaml:ro
      - ./indexer/abis:/app/config/abis:ro
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - anvil
      - pyaleph-api
    profiles:
      - credits
    networks:
      - pyaleph
    logging:
      options:
        max-size: 50m

  credit-service:
    restart: always
    image: ${CREDIT_SERVICE_IMAGE}:${CREDIT_SERVICE_TAG}
    environment:
      ALEPH_SENDER_PRIVATE_KEY: ${CREDIT_SENDER_PRIVATE_KEY}
      ALEPH_CREDIT_ADDRESS: ${CREDIT_SENDER_ADDRESS}
      ALEPH_HOST: http://pyaleph-api:4024
      ALEPH_PAYMENT_CHANNEL: ALEPH_TESTNET_CREDIT
      INDEXER_HOST: http://indexer:8081
      PAYMENTS_ENV: staging
      BLOCKCHAIN_ID: ethereum
      TOKEN_USDC_ADDRESS: ${USDALEPH_ADDRESS}
      TOKEN_USDC_DECIMALS: "6"
      TOKEN_ALEPH_ADDRESS: ${MOCKALEPH_ADDRESS}
      WEB3_ETHEREUM_TESTNET_RPC_HOST: http://anvil:8545
      WEB3_ETHEREUM_TESTNET_CONTRACT: ${CREDIT_CONTRACT_ADDRESS}
      DISTRIBUTION_START_DATE: ${DISTRIBUTION_START_DATE}
      JOB_PAYMENT_ENABLED: "false"
      JOB_EXPENSE_ENABLED: "false"
      LOG_LEVEL: debug
    depends_on:
      - indexer
      - pyaleph-api
    profiles:
      - credits
    networks:
      - pyaleph
    logging:
      options:
        max-size: 50m

networks:
  pyaleph:
