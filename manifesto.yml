# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.0"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.0/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    tag: "0.1.1"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.1"

  aleph-vm:
    # EIP-191 allocation auth (aleph-vm#945) is not in any release yet
    # (latest: 1.12.0, 2026-04-30), so deploy from a branch until one ships.
    # This branch additionally fixes the per-signer iat replay floor rejecting
    # same-second requests to different endpoints, which broke migrations.
    # This downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).
    branch: "fix/iat-cross-endpoint-replay"
    # To deploy from a release instead, replace `branch` with:
    #   version: "1.12.0"

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
