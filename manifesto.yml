# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.0"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.0/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    # 0.1.2 makes node_watcher poll the v2 executions endpoint (scheduler#188),
    # so a gracefully-stopping VM stays observed (present as STOPPED) instead of
    # vanishing from the v1 running-only list and being reported `missing`. Pairs
    # with aleph-vm's stop=stop_vm fix, which keeps the stopped VM in the pool.
    tag: "0.1.2"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.2"

  aleph-vm:
    # TEMPORARY: pinned to the dev-accelerate branch to validate the supervisor
    # rework (gRPC supervisor, integration suite, directory-based migration)
    # against the live migration test before merging aleph-vm#977. Revert to
    # `version: "1.13.0"` once that branch lands.
    # Downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).
    branch: "dev-accelerate"
    # To deploy from a release instead, replace `branch` with:
    #   version: "1.13.0"

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
