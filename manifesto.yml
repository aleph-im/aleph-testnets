# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.1"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.1/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    tag: "0.1.2"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.2"

  aleph-vm:
    # Validating the FULL agent/supervisor boundary stack (all 4 PRs combined):
    # #986 (PR-1 contract->supervisor_interface) + #988 (PR-3 package move) +
    # #989 (PR-2 controller split) + #990 (PR-0 vm_hash->vm_id rename). The tip
    # branch builds a .deb containing all four. Combined-stack GitHub CI is fully
    # green (PR #991): py.test+linting, droplet integration, builds, CodeQL.
    # NOTE: test_confidential_instance_create_and_ssh (init-session "VM not found")
    # is a PRE-EXISTING failure on dev — confirmed by an isolation run pinned to
    # `branch: "dev"` which failed identically (23 passed, 1 failed). It landed via
    # #984/#985, NOT this stack (whose confidential code is behaviour-neutral vs
    # dev). Root cause: crn-up.sh deployed a stale pre-#985 .deb + a reconcile
    # teardown of awaiting-confidential VMs (the latter fixed by #987). Needs the
    # testnet .deb-selection fix + SEV hardware to clear. The other 23 tests pass.
    branch: "od/supervisor-vm-id-rename-impl"
    # To deploy from a Git branch instead of a release, replace `version` with:
    #   branch: "my-feature-branch"
    # This downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
