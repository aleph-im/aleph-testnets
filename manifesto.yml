# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.1"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.1/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    tag: "0.1.2"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.2"

  aleph-vm:
    # Validating the two-process gRPC SPLIT end-to-end. dev now carries the whole
    # agent/supervisor boundary stack (#986/#987/#988/#989/#990 + the firecracker
    # Configuration vm_id fix), and crn-up.sh now sets ALEPH_VM_SUPERVISOR_GRPC_SOCKET
    # so the agent dials the supervisor daemon over gRPC instead of embedding its
    # own pool. Every prior green run validated the in-process path; this is the
    # first run that exercises the connector. Deploy from dev (the old #987 branch
    # was deleted after merge).
    branch: "dev"
    # To deploy from a Git branch instead of a release, replace `version` with:
    #   branch: "my-feature-branch"
    # This downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
