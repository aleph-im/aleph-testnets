# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.1"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.1/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    tag: "0.1.2"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.2"

  aleph-vm:
    # Validating aleph-vm#986 (od/agent-supervisor-contract, PR-1 boundary split).
    # NOTE: test_confidential_instance_create_and_ssh (init-session "VM not found")
    # is a PRE-EXISTING failure on dev — confirmed by an isolation run pinned to
    # `branch: "dev"` which failed identically (23 passed, 1 failed). It landed via
    # #984/#985, NOT #986 (whose confidential-path code is import-only vs dev).
    # The other 23 tests pass; aleph-vm CI for #986 is fully green.
    branch: "od/agent-supervisor-contract"
    # To deploy from a Git branch instead of a release, replace `version` with:
    #   branch: "my-feature-branch"
    # This downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
