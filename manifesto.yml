# manifesto.yml — Version pins for testnet components
#
# "components" are the software under test. PRs bump these.
# "infrastructure" contains companion services that change infrequently.

components:
  pyaleph:
    image: alephim/pyaleph-node
    tag: "0.10.2-rc5"

  p2p-service:
    image: alephim/p2p-service
    tag: "0.1.5"

  aleph-cli:
    version: "0.11.1"
    url: "https://github.com/aleph-im/aleph-rs/releases/download/v0.11.1/aleph-cli-linux-x86_64"

  indexer:
    image: alephim/credit-indexer
    tag: "latest"

  credit-service:
    image: alephim/credit-service
    tag: "latest"

  scheduler-rs:
    image: alephim/scheduler-rs
    tag: "0.1.2"

  scheduler-api:
    image: alephim/scheduler-api
    tag: "0.1.2"

  aleph-vm:
    # Validating PR #987 (od/fix-confidential-reconcile-teardown = dev + the
    # confidential fix): record the owner identity BEFORE build_create_vm_spec so
    # a confidential owner's one-shot init-session resolves owner-auth instead of
    # 404ing during the rootfs/firmware download window (which made the test's
    # finally forget the instance, then reconcile reaped it). Root-caused from the
    # CRN tee-agent journal: init-session 404 was immediate (record-not-found),
    # upstream of the awaiting-init wait. This run confirms the confidential test
    # (the only failure in the prior 23-passed/1-failed run) now passes.
    # The boundary stack (#986+#988+#989+#990) is validated separately via #991.
    branch: "od/fix-confidential-reconcile-teardown"
    # To deploy from a Git branch instead of a release, replace `version` with:
    #   branch: "my-feature-branch"
    # This downloads the .deb from GitHub Actions CI artifacts (requires gh CLI).

infrastructure:
  vm-connector:
    image: ghcr.io/aleph-im/vm-connector
    tag: "alpha"

  postgres:
    image: postgres
    tag: "15.3"
  rabbitmq:
    image: rabbitmq
    tag: "3.11.15-management"
  redis:
    image: redis
    tag: "8.4.0"
  ipfs:
    image: ipfs/kubo
    tag: "v0.37.0"
  anvil:
    image: ghcr.io/foundry-rs/foundry
    tag: "stable"
